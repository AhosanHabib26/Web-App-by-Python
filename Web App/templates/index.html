<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise Metrics Dashboard</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #121214; color: #E1E1E6; margin: 0; padding: 40px; }
        .container { max-width: 800px; margin: 0 auto; }
        h1 { color: #00B37E; margin-bottom: 30px; }
        .metrics-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; }
        .metric-card { background: #202024; padding: 20px; border-radius: 8px; border: 1px solid #323238; text-align: center; }
        .metric-card h3 { margin: 0; color: #8D8D99; font-size: 14px; }
        .metric-card p { font-size: 28px; font-weight: bold; margin: 10px 0 0 0; color: #FFF; }
        form { display: flex; gap: 10px; background: #202024; padding: 20px; border-radius: 8px; border: 1px solid #323238; margin-bottom: 30px; }
        input, select, button { padding: 12px; background: #121214; border: 1px solid #323238; color: #FFF; border-radius: 6px; font-size: 14px; }
        input { flex-grow: 1; }
        button { background: #00B37E; color: #FFF; border: none; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:hover { background: #008F63; }
        .task-list { background: #202024; border-radius: 8px; border: 1px solid #323238; overflow: hidden; }
        .task-item { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; border-bottom: 1px solid #323238; }
        .task-item:last-child { border-bottom: none; }
        .tag { padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; text-transform: uppercase; }
        .tag-work { background: #293845; color: #00B37E; }
        .tag-personal { background: #422F3B; color: #F75A68; }
        .delete-link { color: #F75A68; text-decoration: none; font-size: 14px; font-weight: bold; }
        .delete-link:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Enterprise Project Metrics</h1>

        <div class="metrics-grid">
            <div class="metric-card"><h3>Total Tasks</h3><p>{{ total }}</p></div>
            <div class="metric-card"><h3>Work Pipeline</h3><p>{{ work }}</p></div>
            <div class="metric-card"><h3>Personal Backlog</h3><p>{{ personal }}</p></div>
        </div>

        <form action="/add" method="POST">
            <input type="text" name="title" placeholder="Enter operational task title..." required autocomplete="off">
            <select name="category">
                <option value="Work">Work</option>
                <option value="Personal">Personal</option>
            </select>
            <button type="submit">Deploy Task</button>
        </form>

        <div class="task-list">
            {% for task in tasks %}
            <div class="task-item">
                <div>
                    <span class="tag {% if task[2] == 'Work' %}tag-work{% else %}tag-personal{% endif %}">{{ task[2] }}</span>
                    <span style="margin-left: 10px;">{{ task[1] }}</span>
                </div>
                <a href="/delete/{{ task[0] }}" class="delete-link">✕ Dismiss</a>
            </div>
            {% else %}
            <div class="task-item" style="color: #8D8D99; justify-content: center;">No active operational entries found.</div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
